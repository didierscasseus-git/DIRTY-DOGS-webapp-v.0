<!DOCTYPE html>
<html lang="en">

<head>

    <title>Pamphlet Mechanic | Editorial Tri-fold</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">
        <div class="scroll-container">
            <div class="brochure-viewport">
                <div class="brochure-wrapper">
                    <div class="brochure">
                        <!-- Left Panel (Cover) -->
                        <div class="panel panel-left" id="panel-left" aria-hidden="true">
                            <div class="panel-content">
                                <!-- Editorial Content Removed -->
                            </div>
                            <div class="panel-shadow"></div>
                        </div>

                        <!-- Center Panel (Anchor) -->
                        <div class="panel panel-center">
                            <div class="panel-content">
                                <!-- Editorial Content Removed -->
                            </div>
                        </div>

                        <!-- Right Panel (Back) -->
                        <div class="panel panel-right" id="panel-right" aria-hidden="true">
                            <div class="panel-content">
                                <!-- Editorial Content Removed -->
                            </div>
                            <div class="panel-shadow"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>

</html>
